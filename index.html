<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games by Dmitriy Migunov</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 2rem;
            color: #00f2ff;
            text-shadow: 0 0 20px rgba(0,242,255,0.5);
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-bottom: 48px;
        }
        .games {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .game-card {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 20px 40px;
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 8px;
            transition: all 0.3s;
            letter-spacing: 2px;
            font-size: 1rem;
            min-width: 280px;
            background: rgba(0,242,255,0.03);
        }
        .game-card:hover {
            background: rgba(0,242,255,0.1);
            box-shadow: 0 0 20px rgba(0,242,255,0.15);
            border-color: rgba(0,242,255,0.5);
        }
        .game-card .name {
            color: #00f2ff;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .game-card .desc {
            color: #888;
            font-size: 0.75rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .footer {
            margin-top: 60px;
            color: #444;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GAMES</h1>
        <p class="subtitle">by Dmitriy Migunov</p>
        <div class="games">
            <a href="neonvoid/" class="game-card">
                <div class="name">NEON VOID</div>
                <div class="desc">Arcade Space Shooter</div>
            </a>
            <!-- New games will be added here -->
        </div>
        <div class="footer">
            <p>&copy; 2026 Dmitriy Migunov</p>
        </div>
    </div>
</body>
</html>
